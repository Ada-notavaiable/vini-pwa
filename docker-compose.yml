# Compose file pensato per Portainer Stacks.
# Funziona anche con `docker compose up -d --build`.
#
# Porta host TCP esposta sull'Orange Pi: HARDCODED a 3100 (vedi sezione "ports").
# Per cambiarla, modifica direttamente la voce "ports:" qui sotto — niente più env var.
# (Il progetto fratello `orto` occupa già la 3000 sull'host: 3100 è la scelta sicura.)
#
# Variabili d'ambiente restanti (impostabili nella UI di Portainer allo stack):
#   TZ         - fuso orario del container (es. Europe/Rome)
#   NODE_ENV   - production | development

services:
  vinipwa:
    # Quando Portainer clona la repo da GitHub questo `build` funziona
    # perché Portainer imposta il context sulla cartella del repo.
    build: .
    image: vinipwa:latest
    restart: unless-stopped
    ports:
      # 3100 sull'host → 3000 nel container (server.js).
      # Hardcoded: rimossa la env var HOST_PORT per evitare il conflitto con `orto`.
      - "3100:3000"
    volumes:
      - vinidata:/data
    # Limiti pensati per Orange Pi Zero / piccole board ARM.
    mem_limit: 256m
    mem_reservation: 64m
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - TZ=${TZ:-Europe/Rome}
      - PORT=3000
      - DB_PATH=/data/vini.db
      - PHOTO_DIR=/data/photos
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  vinidata:
