<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6a1b3d" />
  <title>Statistiche — Vini PWA</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <header class="app-header">
    <h1><span class="glass">📊</span> Statistiche</h1>
    <nav class="tabs">
      <a class="tab" href="/" data-tab="vini">Vini</a>
      <a class="tab" href="/negozi.html" data-tab="negozi">Negozi</a>
      <a class="tab active" href="/stats.html" data-tab="stats">Stats</a>
      <a class="tab" href="/storage.html" data-tab="storage">Archivio</a>
    </nav>
  </header>

  <main class="container">

    <section class="stat-grid">
      <div class="stat-card">
        <div class="value" id="stat-total-wines">—</div>
        <div class="label">Vini totali</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-avg-rating">—</div>
        <div class="label">Voto medio</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-total-stores">—</div>
        <div class="label">Negozi</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-best-rating">—</div>
        <div class="label">Voto max</div>
      </div>
    </section>

    <div class="stats-toolbar" role="toolbar" aria-label="Filtra tipo di vino">
      <button type="button" class="toggle-btn" id="toggle-bianchi" aria-pressed="true" title="Mostra/nascondi i vini bianchi">
        <span class="eye-show" aria-hidden="true">👁️</span>
        <span class="eye-hide" aria-hidden="true">🙈</span>
        <span class="lbl">🍾 Bianchi</span>
      </button>
      <button type="button" class="toggle-btn" id="toggle-rossi" aria-pressed="true" title="Mostra/nascondi i vini rossi">
        <span class="eye-show" aria-hidden="true">👁️</span>
        <span class="eye-hide" aria-hidden="true">🙈</span>
        <span class="lbl">🍷 Rossi</span>
      </button>
      <span class="help-text" style="margin: 0; align-self: center;">
        Tocca un negozio per espanderlo · un vino per i dettagli.
      </span>
    </div>

    <div class="section-title">🏪 Vini per negozio</div>
    <div id="by-store"></div>

  </main>

  <footer class="app-footer">Vini PWA · v1</footer>
  <div id="toast-container"></div>

  <!-- Modal: dettaglio vino -->
  <div class="modal-backdrop" id="wine-modal" aria-hidden="true">
    <div class="modal wine-detail" role="dialog" aria-modal="true" aria-labelledby="wine-modal-title">
      <button type="button" class="modal-close" id="wine-modal-close" aria-label="Chiudi">✕</button>
      <div class="wine-detail-photo" id="wine-detail-photo"></div>
      <h2 id="wine-modal-title" class="wine-detail-title"></h2>
      <div class="wine-detail-meta">
        <div class="wm-row"><span class="wm-lbl">🏪 Negozio</span><span class="wm-val" id="wd-store"></span></div>
        <div class="wm-row"><span class="wm-lbl">Tipo</span><span class="wm-val" id="wd-type"></span></div>
        <div class="wm-row"><span class="wm-lbl">Prezzo</span><span class="wm-val" id="wd-price"></span></div>
        <div class="wm-row"><span class="wm-lbl">Voto</span><span class="wm-val" id="wd-stars"></span></div>
        <div class="wm-row"><span class="wm-lbl">Aggiunto</span><span class="wm-val" id="wd-date"></span></div>
        <div class="wm-row wm-note" id="wd-note-row" hidden>
          <span class="wm-lbl">📝 Nota</span><span class="wm-val" id="wd-note"></span>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="wine-modal-close-2">Chiudi</button>
        <button type="button" class="btn btn-danger" id="wine-modal-delete">🗑️ Elimina</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      const $ = (id) => document.getElementById(id);

      function toast(msg, kind = '') {
        const div = document.createElement('div');
        div.className = 'toast' + (kind ? ' ' + kind : '');
        div.textContent = msg;
        $('toast-container').appendChild(div);
        setTimeout(() => div.remove(), 3000);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function fmtPriceStats(p) {
        if (p == null) return '';
        const n = Number(p);
        if (!Number.isFinite(n)) return '';
        try {
          return new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n);
        } catch (_) { return '€' + n.toFixed(2); }
      }

      function renderStars(rating) {
        const max = 10;
        let html = '<div class="stars stars-readonly compact" aria-label="voto ' + rating + ' su 10">';
        for (let i = max; i >= 1; i--) {
          const checked = i <= Number(rating) ? ' checked' : '';
          html += '<input type="radio" disabled' + checked + '><label>★</label>';
        }
        html += '</div>';
        return html;
      }

      function starsInner(rating) {
        const m = renderStars(rating).match(/<div class="stars stars-readonly compact"[^>]*>([\s\S]*?)<\/div>/);
        return m ? m[1] : '';
      }

      function wineTypeBadgeHtml(wt) {
        if (wt === 'bianco') return '<span class="wine-type-badge bianco">🍾 Bianco</span>';
        if (wt === 'rosso')  return '<span class="wine-type-badge rosso">🍷 Rosso</span>';
        return '<span class="wine-type-badge nd">— N/D —</span>';
      }

      // ---------- toggle per tipo: nasconde le liste Bianchi / Rossi ----------

      function bindToggle(btnId, bodyClass) {
        const btn = $(btnId);
        if (!btn) return;
        btn.addEventListener('click', () => {
          // aria-pressed="true"  → la lista È visibile (stato attivo).
          // aria-pressed="false" → la lista È nascosta.
          const currentlyVisible = btn.getAttribute('aria-pressed') !== 'false';
          const newVisible = !currentlyVisible;
          btn.setAttribute('aria-pressed', String(newVisible));
          document.body.classList.toggle(bodyClass, !newVisible);
        });
      }
      bindToggle('toggle-bianchi', 'hide-bianchi');
      bindToggle('toggle-rossi', 'hide-rossi');

      // ---------- rendering: card vino (identica allo stile "attività recenti") ----------

      function createWineCard(w, storeName) {
        const card = document.createElement('div');
        card.className = 'wine-card';
        card.dataset.id = w.id;
        // Stash del payload sulla card → la delega document-level può aprire il popup
        // anche se la card è dentro un <details> con gestori di summary nativi.
        card.__wineData = { wine: w, storeName: storeName };

        const thumbH = w.photo_path
          ? '<img src="/photos/' + encodeURIComponent(w.photo_path) + '" alt="" loading="lazy" />'
          : '🍷';

        card.innerHTML = `
          <div class="thumb">${thumbH}</div>
          <div class="meta">
            <div class="name"></div>
            <div class="store"></div>
            ${w.note ? '<div class="note-preview"></div>' : ''}
            ${w.price != null && Number.isFinite(Number(w.price)) ? '<div class="price"></div>' : ''}
          </div>
          <div class="right">
            <div class="stars compact stars-readonly"></div>
            <div class="date"></div>
          </div>
        `;
        card.querySelector('.name').textContent = w.name;
        const storeText = storeName ? storeName : '— senza negozio —';
        const r = Number(w.rating);
        card.querySelector('.store').textContent = storeText + (Number.isInteger(r) ? ' · voto ' + r : '');
        if (w.note) card.querySelector('.note-preview').textContent = w.note;
        if (w.price != null && Number.isFinite(Number(w.price))) {
          card.querySelector('.price').textContent = fmtPriceStats(w.price);
        }
        card.querySelector('.date').textContent = (w.created_at || '').slice(0, 10);
        card.querySelector('.stars').innerHTML = starsInner(r);
        return card;
      }

      // ---------- rendering: gruppo negozio con sottogruppi per tipo ----------

      function renderStoreGroup(s) {
        const d = document.createElement('details');
        d.className = 'store-details';
        d.open = true; // aperti di default: subito visibili masse di dati

        const sum = document.createElement('summary');
        const avg = s.avg_rating != null ? ' · voto medio ' + Number(s.avg_rating).toFixed(1) : '';
        const countBits = [];
        if (s.count_bianco) countBits.push('<span class="count-tag bianco">🍾 ' + s.count_bianco + '</span>');
        if (s.count_rosso)  countBits.push('<span class="count-tag rosso">🍷 ' + s.count_rosso + '</span>');
        if (s.count_null)   countBits.push('<span class="count-tag null">N/D ' + s.count_null + '</span>');
        sum.innerHTML =
          '<div><strong>' + escapeHtml(s.name) + '</strong>' +
          '<span class="help-text" style="margin-left:6px;">' +
          s.count + ' vini' + avg +
          '</span></div>' +
          '<div class="store-counts">' + countBits.join('') + '</div>';
        d.appendChild(sum);

        const content = document.createElement('div');
        content.className = 'store-content list';

        function addGroup(cls, badge, items) {
          const grp = document.createElement('div');
          grp.className = 'wine-subgroup ' + cls;
          const h = document.createElement('h4');
          h.innerHTML = badge + ' (' + items.length + ')';
          grp.appendChild(h);
          if (!items.length) {
            const empty = document.createElement('div');
            empty.className = 'help-text';
            empty.style.padding = '2px 6px 8px 6px';
            empty.textContent = 'Nessun vino di questo tipo.';
            grp.appendChild(empty);
          } else {
            items.forEach(w => grp.appendChild(createWineCard(w, s.name)));
          }
          content.appendChild(grp);
        }
        addGroup('bianco', '🍾 Bianchi',   (s.wines && s.wines.bianco)    || []);
        addGroup('rosso',  '🍷 Rossi',     (s.wines && s.wines.rosso)     || []);
        addGroup('null',   'Senza tipo',   (s.wines && s.wines.null_type) || []);
        d.appendChild(content);
        return d;
      }

      // ---------- modal: dettaglio vino ----------

      let currentWineModal = null;     // {wine, storeName}
      let lastWineModalTrigger = null;

      function openWineModal(w, storeName, trigger) {
        currentWineModal = { wine: w, storeName: storeName };
        lastWineModalTrigger = trigger || null;

        $('wine-modal-title').textContent = w.name;
        $('wd-store').textContent = storeName ? storeName : '— senza negozio —';
        $('wd-type').innerHTML = wineTypeBadgeHtml(w.wine_type);
        $('wd-price').textContent = (w.price != null && Number.isFinite(Number(w.price)))
          ? fmtPriceStats(w.price)
          : '—';
        $('wd-stars').innerHTML = starsInner(Number(w.rating) || 0);
        $('wd-date').textContent = (w.created_at || '').slice(0, 10) || '—';

        if (w.note && String(w.note).trim() !== '') {
          $('wd-note').textContent = w.note;
          $('wd-note-row').hidden = false;
        } else {
          $('wd-note-row').hidden = true;
          $('wd-note').textContent = '';
        }

        const photoEl = $('wine-detail-photo');
        photoEl.innerHTML = '';
        if (w.photo_path) {
          const img = document.createElement('img');
          img.src = '/photos/' + encodeURIComponent(w.photo_path);
          img.alt = w.name || '';
          img.loading = 'lazy';
          photoEl.appendChild(img);
          photoEl.classList.remove('no-photo');
        } else {
          photoEl.textContent = '🍷';
          photoEl.classList.add('no-photo');
        }

        $('wine-modal').classList.add('open');
        $('wine-modal').setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        try { $('wine-modal-close').focus({ preventScroll: true }); } catch (_) { /* ignore */ }
      }

      function closeWineModal() {
        $('wine-modal').classList.remove('open');
        $('wine-modal').setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        if (lastWineModalTrigger && typeof lastWineModalTrigger.focus === 'function') {
          try { lastWineModalTrigger.focus({ preventScroll: true }); } catch (_) { /* ignore */ }
        }
        lastWineModalTrigger = null;
        currentWineModal = null;
      }

      $('wine-modal-close').addEventListener('click', closeWineModal);
      $('wine-modal-close-2').addEventListener('click', closeWineModal);
      $('wine-modal').addEventListener('click', (ev) => {
        if (ev.target === $('wine-modal')) closeWineModal();
      });
      document.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape' && $('wine-modal').classList.contains('open')) closeWineModal();
      });

      // ---------- delega click: qualsiasi wine-card apre il popup ----------

      document.addEventListener('click', (ev) => {
        const card = ev.target.closest('.wine-card[data-id]');
        if (!card) return;
        const data = card.__wineData;
        if (!data) return;
        ev.preventDefault();
        openWineModal(data.wine, data.storeName, card);
      });

      // ---------- elimina vino dal popup ----------

      $('wine-modal-delete').addEventListener('click', async () => {
        if (!currentWineModal) return;
        const w = currentWineModal.wine;
        const ok = confirm('Eliminare "' + (w.name || 'questo vino') + '"? L\'operazione è irreversibile.');
        if (!ok) return;
        try {
          const r = await fetch('/api/wines/' + w.id, { method: 'DELETE' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          toast('Vino eliminato', 'success');
          closeWineModal();
          loadStats();
        } catch (e) {
          toast('Errore: ' + e.message, 'error');
        }
      });

      // ---------- load stats ----------

      async function loadStats() {
        try {
          const r = await fetch('/api/stats');
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const s = await r.json();

          $('stat-total-wines').textContent = s.total_wines ?? 0;
          $('stat-avg-rating').textContent = s.avg_rating != null ? Number(s.avg_rating).toFixed(1) : '—';
          $('stat-total-stores').textContent = s.total_stores ?? 0;
          const maxR = Array.isArray(s.top_wines) && s.top_wines.length ? s.top_wines[0].rating : null;
          $('stat-best-rating').textContent = maxR != null ? maxR + '/10' : '—';

          const bs = $('by-store');
          bs.innerHTML = '';
          if (!s.by_store || !s.by_store.length) {
            bs.innerHTML = '<div class="empty-state"><span class="icon">🏪</span>Nessun negozio.</div>';
          } else {
            s.by_store.forEach(row => bs.appendChild(renderStoreGroup(row)));
          }
        } catch (e) {
          toast('Errore: ' + e.message, 'error');
        }
      }

      // Marca la tab attiva coerente con il path corrente (utile anche qui).
      const here = location.pathname;
      document.querySelectorAll('.tab').forEach(t => {
        if (t.getAttribute('href') === here) t.classList.add('active');
        else t.classList.remove('active');
      });

      loadStats();
    })();
  </script>
</body>
</html>
