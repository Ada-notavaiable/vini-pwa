<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6a1b3d" />
  <title>Statistiche — Vini PWA</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <header class="app-header">
    <h1><span class="glass">📊</span> Statistiche</h1>
    <nav class="tabs">
      <a class="tab" href="/" data-tab="vini">Vini</a>
      <a class="tab" href="/negozi.html" data-tab="negozi">Negozi</a>
      <a class="tab active" href="/stats.html" data-tab="stats">Stats</a>
      <a class="tab" href="/storage.html" data-tab="storage">Archivio</a>
    </nav>
  </header>

  <main class="container">

    <section class="stat-grid">
      <div class="stat-card">
        <div class="value" id="stat-total-wines">—</div>
        <div class="label">Vini totali</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-avg-rating">—</div>
        <div class="label">Voto medio</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-total-stores">—</div>
        <div class="label">Negozi</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-best-rating">—</div>
        <div class="label">Voto max</div>
      </div>
    </section>

    <div class="section-title">🏆 Top vini</div>
    <div id="top-wines"></div>

    <div class="section-title">🏪 Vini per negozio</div>
    <div id="by-store"></div>

    <div class="section-title">📅 Attività recente</div>
    <div id="recent-wines" class="list"></div>

  </main>

  <footer class="app-footer">Vini PWA · v1</footer>
  <div id="toast-container"></div>

  <!-- Lightbox per ingrandire le immagini -->
  <div class="modal-backdrop image-lightbox-backdrop" id="image-lightbox" aria-hidden="true">
    <div class="image-lightbox" role="dialog" aria-modal="true" aria-label="Immagine ingrandita">
      <button type="button" class="image-lightbox-close" id="image-lightbox-close" aria-label="Chiudi">✕</button>
      <img id="image-lightbox-img" src="" alt="" />
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      const $ = (id) => document.getElementById(id);

      function toast(msg, kind = '') {
        const div = document.createElement('div');
        div.className = 'toast' + (kind ? ' ' + kind : '');
        div.textContent = msg;
        $('toast-container').appendChild(div);
        setTimeout(() => div.remove(), 3000);
      }

      // ---------- lightbox immagini ----------

      let lastTrigger = null;
      let clearImgTimer = null;

      function openImageLightbox(src, trigger, altText) {
        const lb = $('image-lightbox');
        const img = $('image-lightbox-img');

        // Evita che un timer di chiusura precedente cancelli l'immagine appena aperta
        if (clearImgTimer) { clearTimeout(clearImgTimer); clearImgTimer = null; }

        lastTrigger = trigger || null;
        img.src = src;
        img.alt = altText || '';
        lb.classList.add('open');
        lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        // Sposta il focus sul pulsante di chiusura per accessibilità tastiera
        const closeBtn = $('image-lightbox-close');
        if (closeBtn) {
          try { closeBtn.focus({ preventScroll: true }); } catch (_) { closeBtn.focus(); }
        }
      }

      function closeImageLightbox() {
        const lb = $('image-lightbox');
        const img = $('image-lightbox-img');

        lb.classList.remove('open');
        lb.setAttribute('aria-hidden', 'true');
        // Ripristina sempre lo scroll del body, anche in caso di errore
        document.body.style.overflow = '';

        if (clearImgTimer) clearTimeout(clearImgTimer);
        clearImgTimer = setTimeout(() => { img.src = ''; img.alt = ''; clearImgTimer = null; }, 200);

        // Ripristina il focus sull'elemento che ha aperto il lightbox
        if (lastTrigger && typeof lastTrigger.focus === 'function') {
          try { lastTrigger.focus({ preventScroll: true }); } catch (_) { lastTrigger.focus(); }
        }
        lastTrigger = null;
      }

      // Apertura: clic su qualsiasi thumb nella pagina (gestito in delega)
      document.addEventListener('click', (ev) => {
        const thumb = ev.target.closest('.thumb img');
        if (thumb && thumb.src) {
          ev.preventDefault();
          ev.stopPropagation();
          const card = thumb.closest('.wine-card');
          const altText = card ? (card.querySelector('.name')?.textContent || '').trim() : '';
          openImageLightbox(thumb.src, thumb, altText);
        }
      });

      // Chiusura: pulsante, backdrop, tasto Esc
      $('image-lightbox-close').addEventListener('click', closeImageLightbox);
      $('image-lightbox').addEventListener('click', (ev) => {
        if (ev.target === $('image-lightbox')) closeImageLightbox();
      });
      document.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape' && $('image-lightbox').classList.contains('open')) {
          closeImageLightbox();
        }
      });

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function fmtPriceStats(p) {
        if (p == null) return '';
        const n = Number(p);
        if (!Number.isFinite(n)) return '';
        try {
          return new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n);
        } catch (_) { return '€' + n.toFixed(2); }
      }

      function renderStoreGroup(s) {
        const d = document.createElement('details');
        d.className = 'store-details';
        const sum = document.createElement('summary');
        const avg = s.avg_rating != null ? ' · voto medio ' + Number(s.avg_rating).toFixed(1) : '';
        const countBits = [];
        if (s.count_bianco) countBits.push('<span class="count-tag bianco">🍾 ' + s.count_bianco + '</span>');
        if (s.count_rosso)  countBits.push('<span class="count-tag rosso">🍷 ' + s.count_rosso + '</span>');
        if (s.count_null)   countBits.push('<span class="count-tag null">N/D ' + s.count_null + '</span>');
        sum.innerHTML =
          '<div><strong>' + escapeHtml(s.name) + '</strong>' +
          '<span class="help-text" style="margin-left:6px;">' +
          s.count + ' vini' + avg +
          '</span></div>' +
          '<div class="store-counts">' + countBits.join('') + '</div>';
        d.appendChild(sum);

        const content = document.createElement('div');
        content.className = 'store-content';

        function addGroup(title, items, cls, badgeText) {
          if (!items || !items.length) return;
          const grp = document.createElement('div');
          grp.className = 'wine-subgroup ' + (cls || '');
          const h = document.createElement('h4');
          h.innerHTML = badgeText + ' (' + items.length + ')';
          grp.appendChild(h);
          items.forEach(w => {
            const row = document.createElement('div');
            row.className = 'wine-row';
            const bits = [];
            if (w.rating != null) bits.push('voto ' + w.rating);
            if (w.price != null) bits.push(fmtPriceStats(w.price));
            if (w.date) bits.push(w.date);
            row.innerHTML =
              '<div>' + escapeHtml(w.name) + '</div>' +
              '<div class="meta-w">' + escapeHtml(bits.join(' · ')) + '</div>';
            grp.appendChild(row);
          });
          content.appendChild(grp);
        }
        addGroup('Bianchi',  s.wines && s.wines.bianco,    'bianco', '🍾 Bianchi');
        addGroup('Rossi',     s.wines && s.wines.rosso,     'rosso',  '🍷 Rossi');
        addGroup('Senza tipo', s.wines && s.wines.null_type, 'null',  'Senza tipo');
        d.appendChild(content);
        return d;
      }

      function renderStars(rating) {
        // rappresentazione compatta: pallini pieni fino al rating
        const max = 10;
        let html = '<div class="stars stars-readonly compact" aria-label="voto ' + rating + ' su 10">';
        for (let i = max; i >= 1; i--) {
          const checked = i <= Number(rating) ? ' checked' : '';
          html += '<input type="radio" disabled' + checked + '><label>★</label>';
        }
        html += '</div>';
        return html;
      }

      async function loadStats() {
        try {
          const r = await fetch('/api/stats');
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const s = await r.json();

          $('stat-total-wines').textContent = s.total_wines ?? 0;
          $('stat-avg-rating').textContent = s.avg_rating != null ? Number(s.avg_rating).toFixed(1) : '—';
          $('stat-total-stores').textContent = s.total_stores ?? 0;
          const maxR = Array.isArray(s.top_wines) && s.top_wines.length ? s.top_wines[0].rating : null;
          $('stat-best-rating').textContent = maxR != null ? maxR + '/10' : '—';

          const top = $('top-wines');
          top.innerHTML = '';
          if (!s.top_wines || !s.top_wines.length) {
            top.innerHTML = '<div class="empty-state"><span class="icon">🍷</span>Nessun vino ancora.</div>';
          } else {
            s.top_wines.forEach((w, idx) => {
              const row = document.createElement('div');
              row.className = 'rank-row';
              row.innerHTML = `
                <div>
                  <span class="pos ${idx === 0 ? 'gold' : ''}">${idx + 1}</span>
                  <strong></strong>
                  <span class="help-text"></span>
                </div>
                <div class="stars compact stars-readonly"></div>
              `;
              row.querySelector('strong').textContent = w.name;
              row.querySelector('.help-text').textContent = w.store_name ? ' @ ' + w.store_name : '';
              row.querySelector('.stars').innerHTML = renderStars(w.rating).match(/<div class="stars stars-readonly compact"[^>]*>([\s\S]*?)<\/div>/)[1];
              top.appendChild(row);
            });
          }

          const bs = $('by-store');
          bs.innerHTML = '';
          if (!s.by_store || !s.by_store.length) {
            bs.innerHTML = '<div class="empty-state"><span class="icon">🏪</span>Nessun negozio.</div>';
          } else {
            s.by_store.forEach(row => bs.appendChild(renderStoreGroup(row)));
          }

          const rec = $('recent-wines');
          rec.innerHTML = '';
          if (!s.recent || !s.recent.length) {
            rec.innerHTML = '<div class="empty-state"><span class="icon">🕒</span>Niente di recente.</div>';
          } else {
            s.recent.forEach(w => {
              const card = document.createElement('div');
              card.className = 'wine-card';
              const thumbH = w.photo_path
                ? '<img src="/photos/' + encodeURIComponent(w.photo_path) + '" alt="" loading="lazy" />'
                : '🍷';
              card.innerHTML = `
                <div class="thumb">${thumbH}</div>
                <div class="meta">
                  <div class="name"></div>
                  <div class="store"></div>
                </div>
                <div class="right">
                  <div class="stars compact stars-readonly"></div>
                  <div class="date"></div>
                </div>
              `;
              card.querySelector('.name').textContent = w.name;
              card.querySelector('.store').textContent = (w.store_name ? w.store_name + ' · ' : '') + 'voto ' + w.rating;
              card.querySelector('.date').textContent = (w.created_at || '').slice(0, 10);
              card.querySelector('.stars').innerHTML = renderStars(w.rating).match(/<div class="stars stars-readonly compact"[^>]*>([\s\S]*?)<\/div>/)[1];
              rec.appendChild(card);
            });
          }
        } catch (e) {
          toast('Errore: ' + e.message, 'error');
        }
      }

      loadStats();
    })();
  </script>
</body>
</html>
